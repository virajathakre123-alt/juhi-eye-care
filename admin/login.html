<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Juhi Eye Care</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin-global.css" />
    <link rel="stylesheet" href="../css/admin-sidebar.css" />
  <link rel="stylesheet" href="../css/admin-login.css" />
  <script src="../js/admin.js" defer></script>
</head>
<body class="admin-page">
  
  <main class="admin-login-page">
    <section class="admin-login-card" aria-labelledby="login-title">
      <div class="admin-brand" aria-label="Juhi Eye Care Admin">
        <span class="admin-brand__mark" aria-hidden="true"></span>
        <span>Juhi Eye Care</span>
      </div>
      <h1 id="login-title">Clinic Admin Login</h1>
      <p>Secure access for staff to manage appointments, inquiries, treatments, and availability.</p>

      <form class="admin-login-form" data-login-form>
        <div class="admin-field">
          <label for="email">Email address</label>
          <input class="admin-input" id="email" type="email" placeholder="admin@juhieyecare.com" autocomplete="email" required />
        </div>
        <div class="admin-field admin-field--password">
          <label for="password">Password</label>
          <div class="admin-input-wrap">
            <input class="admin-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
            <button class="password-toggle" type="button" aria-label="Show password" aria-pressed="false" data-password-toggle>
              <svg class="icon icon--show" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 5C7 5 2.73 8.11 1 12c1.73 3.89 6 7 11 7s9.27-3.11 11-7c-1.73-3.89-6-7-11-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z" fill="currentColor" />
                <circle cx="12" cy="12" r="2.5" fill="currentColor" />
              </svg>
              <svg class="icon icon--hide is-hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M2 2l20 20-1.5 1.5L.5 3.5 2 2z" fill="currentColor" />
                <path d="M10.58 6.36A7.95 7.95 0 0 1 12 6c5 0 9.27 3.11 11 7-.6 1.35-1.5 2.6-2.64 3.66l-1.42-1.42A5 5 0 0 0 12 8c-.42 0-.83.04-1.22.12L10.58 6.36z" fill="currentColor" />
              </svg>
            </button>
          </div>
        </div>
        <button class="admin-button admin-button--primary" type="submit">Sign in</button>
        <a class="admin-button admin-button--secondary" href="../index.html" style="display:grid;place-items:center;">Back to website</a>
      </form>
    </section>
  </main>
</body>
</html>
