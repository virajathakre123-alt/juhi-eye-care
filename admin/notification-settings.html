<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notification Preferences | Juhi Eye Care Admin</title>
  <link rel="stylesheet" href="../css/admin-global.css">
  <link rel="stylesheet" href="../css/admin-navbar.css">
    <link rel="stylesheet" href="../css/admin-sidebar.css">
  <link rel="stylesheet" href="../css/admin-notification-settings.css">
  <script src="../js/admin.js" defer></script>
  <script src="../js/notification-settings.js" defer></script>
</head>
<body class="admin-page">
  <div class="admin-backdrop" data-admin-backdrop></div>
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-sidebar>
      <div class="admin-sidebar__header">
                <button class="admin-sidebar__close" type="button" data-sidebar-close aria-label="Close sidebar">×</button>
      </div>
      <nav class="admin-sidebar__nav" data-admin-nav>
        <a class="admin-sidebar__link" href="dashboard.html">Dashboard</a>
        <a class="admin-sidebar__link" href="appointments.html">Today's Appointments</a>
        <a class="admin-sidebar__link" href="appointment-requests.html">Appointment Requests</a>
        <a class="admin-sidebar__link" href="availability.html">Availability</a>
        <a class="admin-sidebar__link" href="doctor-profile.html">Profile Management</a>
        <a class="admin-sidebar__link" href="settings.html">Settings</a>
        <a class="admin-sidebar__link" href="login.html" data-logout>Logout</a>
      </nav>
    </aside>

    <div class="admin-content">
      <header class="admin-topbar">
        <div class="admin-topbar__title">
                    <div>
            <h1>Notification Preferences</h1>
            <p class="admin-muted">Choose which events send notifications</p>
          </div>
        </div>
      </header>

      <main class="admin-page-main">
        <div class="admin-container">
          <form id="notification-form" class="admin-card admin-form-card">
            <div class="admin-form-grid">
              <div class="admin-field" style="grid-column:1/-1; display:flex;gap:12px;align-items:center;"><label class="admin-list-item" style="margin:0;"><input type="checkbox" id="notify-new-appointment" checked> New Appointment Notification</label></div>
              <div class="admin-field" style="grid-column:1/-1; display:flex;gap:12px;align-items:center;"><label class="admin-list-item" style="margin:0;"><input type="checkbox" id="notify-cancel" checked> Appointment Cancellation Notification</label></div>
              <div class="admin-field" style="grid-column:1/-1; display:flex;gap:12px;align-items:center;"><label class="admin-list-item" style="margin:0;"><input type="checkbox" id="notify-inquiry"> Patient Inquiry Notification</label></div>
              <div class="admin-field" style="grid-column:1/-1; display:flex;gap:12px;align-items:center;"><label class="admin-list-item" style="margin:0;"><input type="checkbox" id="notify-email" checked> Email Notifications</label></div>
            </div>

            <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:12px;">
              <button id="save-notifications" type="button" class="admin-button admin-button--primary">Save Notification Preferences</button>
            </div>
          </form>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
